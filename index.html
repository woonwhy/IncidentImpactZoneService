<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Impact Zone Map</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1>Incident Impact Zone Service</h1>
    <p>หน้าแสดงพื้นที่ผลกระทบบนแผนที่ประเทศไทย</p>
  </header>

  <div class="container">
    <div class="filters card">
      <div>
        <label for="search">ค้นหา Zone ID / Incident Type</label>
        <input type="text" id="search" placeholder="เช่น zone-001 หรือ flood">
      </div>
      <div>
        <label for="severity">Severity Level</label>
        <select id="severity">
          <option value="ALL">ALL</option>
          <option value="CRITICAL">CRITICAL</option>
          <option value="HIGH">HIGH</option>
          <option value="MEDIUM">MEDIUM</option>
          <option value="LOW">LOW</option>
        </select>
      </div>
      <div>
        <label for="status">Status</label>
        <select id="status">
          <option value="ALL">ALL</option>
          <option value="ACTIVE">ACTIVE</option>
          <option value="CONTAINED">CONTAINED</option>
          <option value="RESOLVED">RESOLVED</option>
          <option value="ARCHIVED">ARCHIVED</option>
        </select>
      </div>
      <div>
        <label for="incidentType">Incident Type</label>
        <select id="incidentType">
          <option value="ALL">ALL</option>
          <option value="flood">flood</option>
          <option value="fire">fire</option>
          <option value="earthquake">earthquake</option>
        </select>
      </div>
    </div>

    <div class="layout">
      <div>
        <div class="card">
          <h2>แผนที่ประเทศไทย</h2>
          <div class="map-box">
            <div id="map"></div>
          </div>
          <div class="legend">
            <span><i class="dot critical"></i> CRITICAL</span>
            <span><i class="dot high"></i> HIGH</span>
            <span><i class="dot medium"></i> MEDIUM</span>
            <span><i class="dot low"></i> LOW</span>
          </div>
        </div>

        <div class="card">
          <h2>รายการ Impact Zones</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Incident</th>
                <th>Severity</th>
                <th>Status</th>
                <th>Population</th>
              </tr>
            </thead>
            <tbody id="zoneTable"></tbody>
          </table>
        </div>
      </div>

      <div>
        <div class="card detail">
          <h2>รายละเอียด Zone</h2>
          <div id="zoneDetail">เลือกจุดบนแผนที่หรือแถวในตารางเพื่อดูรายละเอียด</div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
